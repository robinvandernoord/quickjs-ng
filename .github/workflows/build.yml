name: Build wheels

on:
  push:
    branches:
      - main
      - devel
  workflow_call:
    inputs:
      upstream_tag:
        description: "Upstream quickjs-ng tag to build against"
        required: true
        type: string
  workflow_dispatch:
    inputs:
      upstream_tag:
        description: "Upstream quickjs-ng tag to build against (e.g. v0.12.1)"
        required: true
        type: string

jobs:
  setup:
    runs-on: ubuntu-latest
    outputs:
      upstream_tag: ${{ steps.resolve.outputs.upstream_tag }}
      version: ${{ steps.resolve.outputs.version }}
      publish: ${{ steps.resolve.outputs.publish }}
    steps:
      - uses: actions/checkout@v4
        with:
          submodules: recursive

      - name: Resolve tag and version
        id: resolve
        shell: bash
        run: |
          if [ -n "${{ inputs.upstream_tag }}" ]; then
            # Called from workflow_call or workflow_dispatch with explicit tag
            TAG="${{ inputs.upstream_tag }}"
            cd upstream-quickjs
            git fetch --tags
            git checkout "$TAG"
            cd ..
          else
            # Triggered by push — detect tag from submodule
            cd upstream-quickjs
            git fetch --tags
            TAG=$(git tag --points-at HEAD --sort=-v:refname | head -1)
            if [ -z "$TAG" ]; then
              echo "No tag found at submodule HEAD, using latest tag"
              TAG=$(git tag --sort=-v:refname | head -1)
            fi
            cd ..
          fi

          UPSTREAM_VER="${TAG#v}"
          CURRENT_VER=$(python3 -c "
          import re, pathlib
          text = pathlib.Path('pyproject.toml').read_text()
          m = re.search(r'version = \"(.+?)\"', text)
          print(m.group(1))
          ")
          CURRENT_BASE="${CURRENT_VER%.*}"
          if [ "$CURRENT_BASE" = "$UPSTREAM_VER" ]; then
            VERSION="$CURRENT_VER"
          else
            VERSION="${UPSTREAM_VER}.1"
          fi

          PUBLISH="false"
          if [ "${{ github.ref }}" = "refs/heads/main" ] || [ "${{ github.event_name }}" = "workflow_call" ] || [ "${{ github.event_name }}" = "workflow_dispatch" ]; then
            PUBLISH="true"
          fi

          echo "upstream_tag=$TAG" >> $GITHUB_OUTPUT
          echo "version=$VERSION" >> $GITHUB_OUTPUT
          echo "publish=$PUBLISH" >> $GITHUB_OUTPUT

  build-sdist:
    needs: setup
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          submodules: recursive

      - name: Checkout upstream tag
        run: |
          cd upstream-quickjs
          git fetch --tags
          git checkout ${{ needs.setup.outputs.upstream_tag }}

      - name: Set version
        run: |
          sed -i "s/^version = \".*\"/version = \"${{ needs.setup.outputs.version }}\"/" pyproject.toml

      - name: Build sdist
        run: pipx run build --sdist

      - uses: actions/upload-artifact@v4
        with:
          name: sdist
          path: dist/*.tar.gz

  build-wheels:
    needs: setup
    name: Build ${{ matrix.os }} ${{ matrix.arch }}
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: ubuntu-latest
            arch: x86_64
            cibw_archs: x86_64
          - os: ubuntu-latest
            arch: i686
            cibw_archs: i686
            cibw_manylinux_image: manylinux_2_28
          - os: ubuntu-latest
            arch: aarch64
            cibw_archs: aarch64
            cibw_manylinux_image: manylinux_2_28
          - os: windows-latest
            arch: x86_64
            cibw_archs: AMD64
          - os: windows-latest
            arch: i686
            cibw_archs: x86
          - os: macos-14
            arch: arm64
            cibw_archs: arm64

    steps:
      - uses: actions/checkout@v4
        with:
          submodules: recursive

      - name: Checkout upstream tag
        run: |
          cd upstream-quickjs
          git fetch --tags
          git checkout ${{ needs.setup.outputs.upstream_tag }}

      - name: Set version
        shell: bash
        run: |
          sed -i.bak "s/^version = \".*\"/version = \"${{ needs.setup.outputs.version }}\"/" pyproject.toml

      - name: Set up QEMU
        if: matrix.arch == 'aarch64'
        uses: docker/setup-qemu-action@v3
        with:
          platforms: arm64

      - name: Build wheels
        uses: pypa/cibuildwheel@v2.23
        env:
          CIBW_BUILD: "cp310-* cp311-* cp312-* cp313-* cp314-*"
          CIBW_ARCHS: ${{ matrix.cibw_archs }}
          CIBW_MANYLINUX_I686_IMAGE: ${{ matrix.cibw_manylinux_image && format('quay.io/pypa/{0}_i686', matrix.cibw_manylinux_image) || '' }}
          CIBW_MANYLINUX_AARCH64_IMAGE: ${{ matrix.cibw_manylinux_image && format('quay.io/pypa/{0}_aarch64', matrix.cibw_manylinux_image) || '' }}

      - uses: actions/upload-artifact@v4
        with:
          name: wheels-${{ matrix.os }}-${{ matrix.arch }}
          path: wheelhouse/*.whl

  publish:
    needs: [setup, build-sdist, build-wheels]
    if: needs.setup.outputs.publish == 'true'
    runs-on: ubuntu-latest
    permissions:
      id-token: write
      contents: write
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - uses: actions/download-artifact@v4
        with:
          path: dist
          merge-multiple: true

      - name: Publish to PyPI
        uses: pypa/gh-action-pypi-publish@release/v1

      - name: Create and push tag
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git tag "v${{ needs.setup.outputs.version }}"
          git push origin "v${{ needs.setup.outputs.version }}"
